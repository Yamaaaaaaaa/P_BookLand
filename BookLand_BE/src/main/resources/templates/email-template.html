<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo từ BookLand</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f6f9fc;
            margin: 0;
            padding: 0;
            color: #333333;
        }
        .email-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .header {
            background-color: #c92127; /* Màu đỏ chủ đạo của ứng dụng */
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            padding: 32px 24px;
            line-height: 1.6;
        }
        .greeting {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .message-box {
            background-color: #f8fafc;
            border-left: 4px solid #c92127;
            padding: 16px;
            margin: 24px 0;
            border-radius: 4px;
        }
        .btn-action {
            display: inline-block;
            background-color: #c92127;
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 600;
            margin-top: 24px;
        }
        .footer {
            background-color: #f8fafc;
            padding: 24px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="header">
            <h1>BookLand Store</h1>
        </div>
        <div class="content">
            <div class="greeting">Xin chào <span th:text="${name}">Customer</span>,</div>
            
            <p th:text="${message}">Chúng tôi gửi email này để thông báo về một cập nhật từ hệ thống BookLand.</p>
            
            <div class="message-box" th:if="${details != null}">
                <strong>Chi tiết:</strong>
                <p th:text="${details}" style="margin: 8px 0 0 0;"></p>
            </div>
            
            <center th:if="${actionUrl != null}">
                <a th:href="${actionUrl}" class="btn-action" th:text="${actionText}">Xem Chi Tiết</a>
            </center>
        </div>
        <div class="footer">
            <p>Email này được tạo tự động. Vui lòng không trả lời trực tiếp email này.</p>
            <p>&copy; 2026 BookLand. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
